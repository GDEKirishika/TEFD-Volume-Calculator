<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="x-icon" href="favicon.ico">
    <title>3D Volume Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
        }
        h1 {
            color: #fff;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: slideDown 1s ease-out;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .content-wrapper {
            display: flex;
            gap: 30px;
            flex: 1;
            animation: fadeIn 0.8s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .shape-container {
            flex: 1;
            min-height: 500px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }
        #canvas3d {
            width: 100% !important;
            height: 100% !important;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        .info-text {
            color: #fff;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
        }
        .form-container {
            flex: 1;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }
        form {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border: 3px solid #fff;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #fff;
            border-radius: 8px;
            background: rgba(255,255,255,0.95);
            color: #333;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #ffd700;
            outline: none;
            background: #fff;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 10px;
        }
        button:hover {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        button:active {
            transform: translateY(-1px);
        }
        #result {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-top: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            animation: slideUp 0.5s ease-in;
            border: 2px solid #fff;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @media (max-width: 1024px) {
            .content-wrapper {
                flex-direction: column;
                gap: 20px;
            }
            .shape-container {
                min-height: 400px;
            }
            .form-container {
                min-height: auto;
            }
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 3D Twisted Elliptical Frustum Volume Calculator</h1>
        
        <div class="content-wrapper">
            <div class="shape-container">
                <canvas id="canvas3d"></canvas>
                <div class="info-text">
                    💡 Use mouse to rotate • Scroll to zoom • Right-click to pan
                </div>
            </div>
            
            <div class="form-container">
                <form id="calcForm">
                    <div class="form-group">
                        <label>Height (h): <input type="number" id="h" step="any" value="5" required></label>
                    </div>
                    <div class="form-group">
                        <label>Bottom semi-axis a1: <input type="number" id="a1" step="any" value="8" required></label>
                    </div>
                    <div class="form-group">
                        <label>Bottom semi-axis b1: <input type="number" id="b1" step="any" value="6" required></label>
                    </div>
                    <div class="form-group">
                        <label>Top semi-axis a2: <input type="number" id="a2" step="any" value="4" required></label>
                    </div>
                    <div class="form-group">
                        <label>Top semi-axis b2: <input type="number" id="b2" step="any" value="3" required></label>
                    </div>
                    <div class="form-group">
                        <label>Dome radius (r): <input type="number" id="r" step="any" value="3" required></label>
                    </div>
                    <div class="form-group">
                        <label>Twist (degrees): <input type="number" id="twist" step="any" value="0"></label>
                    </div>
                    <button type="button" onclick="calculate()">📊 Calculate Volume</button>
                    <div id="result"></div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
</html>
